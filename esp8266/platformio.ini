[env:espino32]
platform  = espressif32
board     = esp32dev
framework = arduino

board_build.mcu        = esp32
board_build.f_cpu      = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio

monitor_speed = 115200

lib_deps =
  miguelbalboa/MFRC522@^1.4.12

build_flags =
  -D SERIAL_BAUD=115200
