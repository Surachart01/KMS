[env]
platform  = espressif8266
framework = arduino
board     = nodemcuv2
monitor_speed = 115200

lib_deps =
  miguelbalboa/MFRC522@^1.4.12
  bblanchon/ArduinoJson@^7.0.0

; ── Board A: Slot 1-4 (4 NFC, RST=GPIO0, CS: 4,5,16,2) ──
[env:board_a]
build_flags =
  -D BOARD_ID=1
  -D NFC_COUNT=4
  -D SLOT_OFFSET=0
  -D PIN_RST=0

; ── Board B: Slot 5-7 (3 NFC, RST=GPIO2, CS: 4,5,16) ──
[env:board_b]
build_flags =
  -D BOARD_ID=2
  -D NFC_COUNT=3
  -D SLOT_OFFSET=4
  -D PIN_RST=2

; ── Board C: Slot 8-10 (3 NFC, RST=GPIO2, CS: 4,5,16) ──
[env:board_c]
build_flags =
  -D BOARD_ID=3
  -D NFC_COUNT=3
  -D SLOT_OFFSET=7
  -D PIN_RST=2
